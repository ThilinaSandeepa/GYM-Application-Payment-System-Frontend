<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Members - FitCore</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <h1 class="logo">FitCore</h1>
            <ul class="nav-menu">
                <li><a href="index.html">Dashboard</a></li>
                <li><a href="payments.html">Payments</a></li>
                <li><a href="create-payment.html">New Payment</a></li>
                <li><a href="members.html" class="active">Members</a></li>
                <li><a href="trainers.html">Trainers</a></li>
                <li><a href="invoices.html">Invoices</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <h1>Members</h1>
            <button onclick="openAddMemberModal()" class="btn btn-primary">+ Add Member</button>
        </div>

        <div class="section">
            <div class="filter-buttons">
                <button onclick="filterMembers('ALL')" class="btn btn-secondary active">All Members</button>
                <button onclick="filterMembers('PREMIUM')" class="btn btn-warning">Premium</button>
                <button onclick="filterMembers('NEW')" class="btn btn-info">New</button>
            </div>
        </div>

        <div class="section">
            <div class="table-wrapper">
                <table class="data-table" id="membersTable">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Phone</th>
                            <th>Type</th>
                            <th>Join Date</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="membersTableBody">
                        <tr><td colspan="7" class="loading-row">Loading members...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Add/Edit Member Modal -->
    <div id="memberModal" class="modal" style="display:none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Add New Member</h2>
                <button onclick="closeMemberModal()" class="close-btn">&times;</button>
            </div>
            <div class="modal-body">
                <form id="memberForm">
                    <div class="form-group">
                        <label>Name *</label>
                        <input type="text" id="memberName" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label>Email *</label>
                        <input type="email" id="memberEmail" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label>Phone *</label>
                        <input type="tel" id="memberPhone" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label>Member Type *</label>
                        <select id="memberType" class="form-control" required>
                            <option value="PREMIUM">Premium</option>
                            <option value="NEW">New</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Join Date *</label>
                        <input type="date" id="joinDate" class="form-control" required>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button onclick="saveMember()" class="btn btn-primary">Save Member</button>
                <button onclick="closeMemberModal()" class="btn btn-secondary">Cancel</button>
            </div>
        </div>
    </div>

    <footer class="footer">
        <p>&copy; 2024 FitCore Payment System. All rights reserved.</p>
    </footer>

    <script src="api.js"></script>
    <script src="members.js"></script>
</body>
</html>
