<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoices - FitCore</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <h1 class="logo">FitCore</h1>
            <ul class="nav-menu">
                <li><a href="index.html">Dashboard</a></li>
                <li><a href="payments.html">Payments</a></li>
                <li><a href="create-payment.html">New Payment</a></li>
                <li><a href="members.html">Members</a></li>
                <li><a href="trainers.html">Trainers</a></li>
                <li><a href="invoices.html" class="active">Invoices</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <h1>All Invoices</h1>
            <button onclick="printAllInvoices()" class="btn btn-primary">🖨️ Print All</button>
        </div>

        <div class="section">
            <div class="table-wrapper">
                <table class="data-table" id="invoicesTable">
                    <thead>
                        <tr>
                            <th>Invoice #</th>
                            <th>Payee</th>
                            <th>Type</th>
                            <th>Original Amount</th>
                            <th>Discount %</th>
                            <th>Discount Amount</th>
                            <th>Total Payable</th>
                            <th>Method</th>
                            <th>Status</th>
                            <th>Date</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="invoicesTableBody">
                        <tr><td colspan="11" class="loading-row">Loading invoices...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Invoice Preview Modal -->
    <div id="invoiceModal" class="modal" style="display:none;">
        <div class="modal-content invoice-content">
            <div class="modal-header">
                <h2>Invoice Details</h2>
                <button onclick="closeInvoiceModal()" class="close-btn">&times;</button>
            </div>
            <div class="modal-body">
                <div class="invoice-preview" id="invoicePreview">
                    <!-- Invoice content will be loaded here -->
                </div>
            </div>
            <div class="modal-footer">
                <button onclick="printInvoice()" class="btn btn-primary">🖨️ Print</button>
                <button onclick="downloadInvoice()" class="btn btn-success">⬇️ Download PDF</button>
                <button onclick="closeInvoiceModal()" class="btn btn-secondary">Close</button>
            </div>
        </div>
    </div>

    <footer class="footer">
        <p>&copy; 2024 FitCore Payment System. All rights reserved.</p>
    </footer>

    <script src="api.js"></script>
    <script src="invoices.js"></script>
</body>
</html>
